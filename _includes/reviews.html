<style>
    .reviews {
        background: var(--sage-dark);
        padding: 70px 24px;
    }

    .reviews__header {
        text-align: center;
        max-width: 560px;
        margin: 0 auto 56px;
    }

    .reviews__label {
        font-family: 'DM Sans', sans-serif;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--sage-light);
        margin-bottom: 12px;
    }

    .reviews__title {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: clamp(1.8rem, 3.5vw, 2.6rem);
        color: #fff;
        line-height: 1.2;
    }

    .reviews__grid {
        max-width: 1040px;
        margin: 0 auto;
        /* display: grid; */
        /* grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); */
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: space-evenly;
        gap: 24px;
    }

    .rcard {
        background: rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        transition: var(--transition);
        width: 47%;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
    }

    @media (max-width: 600px) {
        .rcard {
            width: 95%;
        }
    }

    .rcard:hover {
        background: rgba(255, 255, 255, 0.13);
        transform: translateY(-4px);
    }

    .rcard__stars {
        color: var(--gold);
        font-size: 1rem;
        letter-spacing: 2px;
        margin-bottom: 18px;
    }

    .rcard__quote {
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.82);
        font-weight: 300;
        font-style: italic;
        margin-bottom: 20px;
    }

    .rcard__author {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .rcard__avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--sage-light);
    }

    .rcard__name {
        font-family: 'DM Sans', sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        color: #fff;
    }

    .rcard__source {
        font-family: 'DM Sans', sans-serif;
        font-size: 0.78rem;
        color: var(--sage-light);
        font-weight: 400;
    }
</style>

{% for review in site.data.reviews %}
<div class="rcard">
    <div class="rcard__stars">★★★★★</div>
    <p class="rcard__quote">"{{ review.content }}"</p>
    <div class="rcard__author">
        <img src="{{ review.image }}" alt="{{ review.author }}" class="rcard__avatar" loading="lazy">
        <div>
            <div class="rcard__name">{{ review.author }}</div>
            <div class="rcard__source">via {{ review.source }}</div>
        </div>
    </div>
</div>
{% endfor %}
