<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Erin's Pet Sitting Services</title>
  <style>
    body, table, td, a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }
    img {
      -ms-interpolation-mode: bicubic;
    }

    /* Responsive Styles */
    @media screen and (max-width: 600px) {
      .email-container {
        width: 100% !important;
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f7f7f7;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%">
    <tr>
      <td align="center" bgcolor="#f7f7f7">
        <table border="0" cellpadding="0" cellspacing="0" width="600" class="email-container" style="background-color: #ffffff; padding: 20px; font-family: Arial, sans-serif;">
          <!-- Header -->
          <tr>
            <td align="center" style="padding: 20px 0;">
              <img src="https://erinspetsittingservices.co.uk/erins-pet-sitting-services.jpg" alt="Erin's Pet Sitting Services" width="100" style="display: block;">
            </td>
          </tr>
          <!-- Title -->
          <tr>
            <td align="center" style="padding: 10px 0;">
              <h1 style="color: #333333; font-size: 24px; margin: 0;">{{title}}</h1>
            </td>
          </tr>
          <!-- Body Content -->
          <tr>
            <td style="padding: 20px 0; color: #555555; font-size: 16px; line-height: 24px;">
              {{ref}}
              <p>If you have any questions, please contact me for further assistance.</p>
              <p>Thank you,<br>Erin</p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding: 20px 0; font-size: 14px; color: #999999;">
              <p>Erin's Pet Sitting Services<br>
              Gravesend, Kent<br>
              <a href="mailto:erinspetsittingservices@mail.com" style="color: #999999; text-decoration: none;">erinspetsittingservices@mail.com</a></p>
              <p>
                <a href="https://www.facebook.com/people/Erins-Pet-Sitting-Services/61560319745772" style="margin: 0 5px;">
                  <img src="https://cdn-icons-png.flaticon.com/24/733/733547.png" alt="Facebook" width="24" height="24" style="vertical-align: middle;">
                </a>
                <a href="https://www.instagram.com/ErinsPetSittingServicesKent" style="margin: 0 5px;">
                  <img src="https://cdn-icons-png.flaticon.com/24/733/733558.png" alt="Instagram" width="24" height="24" style="vertical-align: middle;">
                </a>
              </p>
              <p style="font-size: 12px; color: #cccccc;">&copy; 2025 Erin's Pet Sitting Services. All rights reserved.<br>
              <a href="https://erinspetsittingservices.co.uk/downloads/PrivacyPolicy.pdf" style="font-size: 12px; color: #cccccc; text-decoration: none;">Privacy Policy</a></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
